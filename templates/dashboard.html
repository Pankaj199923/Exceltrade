<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Excel Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E11;
    --panel: #12161B;
    --border: #232A32;
    --text: #E6E9EC;
    --muted: #7C8590;
    --live: #3DDC84;
    --live-dim: #1E5C3C;
    --amber: #F5A623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-title {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .status-item { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    position: relative;
  }
  .dot.live {
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.55); }
    70% { box-shadow: 0 0 0 8px rgba(61, 220, 132, 0); }
    100% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0); }
  }
  .scanline {
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--live), transparent);
    opacity: 0;
  }
  .scanline.flash {
    animation: scan 0.9s ease-out;
  }
  @keyframes scan {
    0% { opacity: 1; transform: translateX(-100%); }
    60% { opacity: 1; }
    100% { opacity: 0; transform: translateX(100%); }
  }
  .container {
    padding: 24px 28px 48px;
    max-width: 100%;
    margin: 0 auto;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .sheet-name {
    font-size: 22px;
    font-weight: 600;
  }
  .row-count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 13px;
  }
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    background: var(--panel);
    max-width: 100%;
    max-height: 72vh;
  }
  .table-wrap::-webkit-scrollbar {
    height: 10px;
    width: 10px;
  }
  .table-wrap::-webkit-scrollbar-track {
    background: var(--panel);
  }
  .table-wrap::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 5px;
  }
  .table-wrap::-webkit-scrollbar-thumb:hover {
    background: var(--muted);
  }
  table {
    width: max-content;
    min-width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 12px 16px;
    background: #171C22;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    max-width: 320px;
  }
  thead th.col-num { text-align: right; }
  thead th.idx-col {
    left: 0;
    z-index: 3;
    text-align: center;
    width: 1%;
  }
  tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.col-num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #B9E6CA;
  }
  tbody td.idx-col {
    position: sticky;
    left: 0;
    background: #12161B;
    color: var(--muted);
    text-align: center;
    z-index: 1;
    font-size: 11px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
  tbody tr:nth-child(even) td.idx-col { background: #141920; }
  tbody tr:hover td { background: #171C22; }
  tbody tr:hover td.idx-col { background: #1A2029; }
  tbody tr.updated td {
    animation: rowFlash 1.4s ease-out;
  }
  @keyframes rowFlash {
    0% { background: rgba(61, 220, 132, 0.18); }
    100% { background: transparent; }
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--live-dim); }
  .search-box::placeholder { color: var(--muted); }
  .col-count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 12px;
  }
  .no-match {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .big {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .empty-state .small {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="scanline" id="scanline"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-title">Live Excel Dashboard</div>
    <div class="brand-sub">/ real-time sync</div>
  </div>
  <div class="status">
    <div class="status-item"><span class="dot" id="connDot"></span><span id="connText">connecting…</span></div>
    <div class="status-item">last update: <span id="updatedAt" style="color:var(--text)">—</span></div>
  </div>
</div>

<div class="container">
  <div class="meta-row">
    <div class="sheet-name" id="sheetName">Waiting for data…</div>
    <div class="toolbar">
      <input type="text" class="search-box" id="searchBox" placeholder="Search rows…" oninput="applyFilter()" disabled>
      <span class="col-count" id="colCount"></span>
      <span class="row-count" id="rowCount"></span>
    </div>
  </div>

  <div class="table-wrap">
    <div id="tableContainer">
      <div class="empty-state">
        <div class="big">Abhi tak koi data nahi aaya</div>
        <div class="small">Apna excel_watcher.py chalu karo taaki live data yahan dikhe</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/socket.io.min.js"></script>
<script>
  const socket = io();
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const scanline = document.getElementById('scanline');
  const sheetName = document.getElementById('sheetName');
  const rowCount = document.getElementById('rowCount');
  const colCount = document.getElementById('colCount');
  const updatedAt = document.getElementById('updatedAt');
  const tableContainer = document.getElementById('tableContainer');
  const searchBox = document.getElementById('searchBox');

  let currentHeaders = [];
  let currentRows = [];

  socket.on('connect', () => {
    connDot.classList.add('live');
    connText.textContent = 'live';
  });

  socket.on('disconnect', () => {
    connDot.classList.remove('live');
    connText.textContent = 'disconnected';
  });

  socket.on('data_update', (data) => {
    if (!data || !data.headers || data.headers.length === 0) return;
    loadData(data);
    scanline.classList.remove('flash');
    void scanline.offsetWidth; // restart animation
    scanline.classList.add('flash');
  });

  function loadData(data) {
    sheetName.textContent = data.sheet_name || 'Sheet';
    rowCount.textContent = `${data.rows.length} rows`;
    colCount.textContent = `${data.headers.length} cols`;
    updatedAt.textContent = data.updated_at || '—';
    currentHeaders = data.headers;
    currentRows = data.rows;
    searchBox.disabled = false;
    renderTable(currentHeaders, currentRows);
  }

  // Ek column poori tarah numeric hai ya nahi, yeh check karke right-align + number formatting apply karte hain
  function isNumericValue(v) {
    if (v === null || v === undefined || v === '') return false;
    const n = Number(String(v).replace(/,/g, ''));
    return !isNaN(n) && isFinite(n);
  }

  function columnIsNumeric(colIdx, rows) {
    let sawValue = false;
    for (const row of rows) {
      const v = row[colIdx];
      if (v === null || v === undefined || v === '') continue;
      sawValue = true;
      if (!isNumericValue(v)) return false;
    }
    return sawValue;
  }

  function formatNumber(v) {
    const n = Number(String(v).replace(/,/g, ''));
    if (Number.isInteger(n)) return n.toLocaleString('en-IN');
    return n.toLocaleString('en-IN', { maximumFractionDigits: 4 });
  }

  function renderTable(headers, rows) {
    if (rows.length === 0) {
      tableContainer.innerHTML = `
        <div class="empty-state">
          <div class="big">Sheet khali hai</div>
          <div class="small">Data daalo aur save karo</div>
        </div>`;
      return;
    }

    const numericCols = headers.map((_, i) => columnIsNumeric(i, rows));

    let html = '<table><thead><tr><th class="idx-col">#</th>';
    headers.forEach((h, i) => {
      html += `<th class="${numericCols[i] ? 'col-num' : ''}" title="${escapeHtml(h)}">${escapeHtml(h)}</th>`;
    });
    html += '</tr></thead><tbody>';
    rows.forEach((row, rIdx) => {
      html += '<tr class="updated">';
      html += `<td class="idx-col">${rIdx + 1}</td>`;
      row.forEach((cell, cIdx) => {
        const raw = cell === null || cell === undefined ? '' : cell;
        const isNum = numericCols[cIdx] && isNumericValue(raw) && raw !== '';
        const display = isNum ? formatNumber(raw) : escapeHtml(raw);
        html += `<td class="${isNum ? 'col-num' : ''}" title="${escapeHtml(raw)}">${display}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    tableContainer.innerHTML = html;
  }

  function applyFilter() {
    const q = searchBox.value.trim().toLowerCase();
    if (!q) {
      renderTable(currentHeaders, currentRows);
      rowCount.textContent = `${currentRows.length} rows`;
      return;
    }
    const filtered = currentRows.filter(row =>
      row.some(cell => String(cell ?? '').toLowerCase().includes(q))
    );
    rowCount.textContent = `${filtered.length} / ${currentRows.length} rows`;
    if (filtered.length === 0) {
      tableContainer.innerHTML = `<div class="no-match">Koi match nahi mila for "${escapeHtml(searchBox.value)}"</div>`;
      return;
    }
    renderTable(currentHeaders, filtered);
  }

  function escapeHtml(val) {
    const div = document.createElement('div');
    div.textContent = val === null || val === undefined ? '' : val;
    return div.innerHTML;
  }

  // Page load hote hi latest data fetch kar lo (agar socket connect hone se pehle miss ho jaaye)
  fetch('/latest').then(r => r.json()).then(data => {
    if (data.headers && data.headers.length) {
      loadData(data);
    }
  });
</script>

</body>
</html>
